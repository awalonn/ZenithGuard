<!DOCTYPE html>
<html>
<head>
    <title>ZenithGuard</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/popup.css">
    <link rel="stylesheet" href="../css/toast.css">
</head>
<body>
    <div id="app-root">
        <div id="paused-view">
            <h2>Protection Paused</h2>
            <p>ZenithGuard will resume automatically in <span id="pause-timer">15:00</span>.</p>
            <button id="resume-btn">Resume Now</button>
        </div>

        <div id="normal-view">
            <header class="header">
                <div class="header-info">
                    <img src="../icons/icon48.png" alt="ZenithGuard Logo">
                    <div class="header-title">
                        <h1>ZenithGuard</h1>
                        <span id="site-hostname">Loading...</span>
                    </div>
                </div>
                <div id="power-btn-container">
                    <button id="power-btn" aria-label="Toggle Protection">
                        <svg id="power-icon-enabled" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12.65,10C11.83,7.67 9.61,6 7,6A6,6 0 0,0 1,12A6,6 0 0,0 7,18C9.61,18 11.83,16.33 12.65,14H17V18H21V14H23V10H12.65M7,14A2,2 0 0,1 5,12A2,2 0 0,1 7,10A2,2 0 0,1 9,12A2,2 0 0,1 7,14Z" /></svg>
                        <svg id="power-icon-disabled" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="display: none;"><path d="M13,10H23V14H21V18H17V14H13V10M5.09,7.5L3.68,8.91L8.1,13.33C7.78,13.21 7.4,13.12 7,13.12A1.88,1.88 0 0,0 5.12,15A1.88,1.88 0 0,0 7,16.88C7.8,16.88 8.5,16.35 8.78,15.63L13.2,20.05L14.61,18.64L5.09,7.5M1,12A6,6 0 0,0 7,18C8.5,18 9.87,17.5 11,16.7L6.7,12.4C6.29,12.58 6,13.04 6,13.59C6,14.36 6.64,15 7.41,15C7.96,15 8.42,14.71 8.59,14.3L12.73,18.44C11.89,19.29 10.78,20 9.5,20C6.32,20 3.7,17.71 3.07,15H1V11H3.07C3.7,8.29 6.32,6 9.5,6C10.78,6 11.89,6.71 12.73,7.56L11.27,9.03C10.6,8.38 9.61,8 8.5,8C6.1,8 4.12,9.83 3.55,12H1Z" /></svg>
                    </button>
                </div>
            </header>

            <main class="main-content">
                <!-- AI Privacy Briefing -->
                <div id="privacy-briefing-card" class="briefing-card">
                    <div class="briefing-header">
                        <h2>AI Privacy Briefing</h2>
                        <a href="#" id="privacy-grade-badge" class="grade-badge grade-none" target="_blank">Scan</a>
                    </div>
                    <div id="briefing-content">
                        <!-- Content is rendered by popup.js -->
                    </div>
                </div>

                <!-- Activity Center -->
                <div id="activity-center">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="insights">Insights</button>
                        <button class="tab-btn" data-tab="activity">Activity</button>
                        <button class="tab-btn" data-tab="rules">Rules</button>
                        <button class="tab-btn" data-tab="cookies">Cookie Jar</button>
                    </div>
                    <div id="insights" class="tab-content active"></div>
                    <div id="activity" class="tab-content"></div>
                    <div id="rules" class="tab-content">
                        <div id="rules-list-container">
                            <!-- Custom rules will be rendered here by JS -->
                        </div>
                        <div class="add-rule-form">
                            <input type="text" id="add-rule-input" placeholder="Enter CSS selector to hide...">
                            <button id="add-rule-btn">Add</button>
                        </div>
                    </div>
                    <div id="cookies" class="tab-content"></div>
                </div>
            </main>

            <footer class="footer">
                <button id="defeat-wall-btn" class="footer-btn" aria-label="Defeat Adblock Wall">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5,2C18,2 20,4 20,6.5C20,9 18,11 15.5,11C13,11 11,9 11,6.5C11,4 13,2 15.5,2M15.5,4C14.12,4 13,5.12 13,6.5C13,7.88 14.12,9 15.5,9C16.88,9 18,7.88 18,6.5C18,5.12 16.88,4 15.5,4M15.5,12C12.29,12 8.44,13.17 6.31,14.68L5.64,14.22L4.22,15.64L4.9,16.31C3.83,18.44 5,22 5,22C8.28,19.29 10.5,17.17 11.56,16.11L12.91,17.46L14.33,16.05L13.03,14.75C13.84,14.53 14.65,14.36 15.5,14.29V12M7.64,20.36C6.63,19.34 6.27,17.65 6.74,16.27L7.41,16.94L8.5,15.86L7.83,15.19C9.21,14.72 10.9,14.36 12.21,14.19L11.5,14.9L12.92,16.31L13.62,15.61C14.68,16.67 16.79,18.96 19.5,21.67C19.5,21.67 15.83,22.5 13.69,21.42L12.63,20.36L11.21,21.78L10.16,20.73L7.64,20.36Z" /></svg>
                    </span>
                    <span class="btn-text">Defeat Wall</span>
                    <div class="btn-spinner"></div>
                </button>
                <button id="zapper-mode-btn" class="footer-btn" aria-label="Enter Zapper Mode">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M7,2V13H10V22L17,10H13L17,2H7Z" /></svg>
                    </span>
                    <span class="btn-text">Zapper</span>
                </button>
                <button id="open-inspector-btn" class="footer-btn">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 9C10.3 9 9 10.3 9 12S10.3 15 12 15 15 13.7 15 12 13.7 9 12 9M12 17C9.2 17 7 14.8 7 12S9.2 7 12 7 17 9.2 17 12 14.8 17 12 17M12 5C7 5 2.7 7.9 1 12C2.7 16.1 7 19 12 19S21.3 16.1 23 12C21.3 7.9 17 5 12 5Z" /></svg>
                    </span>
                     <span class="btn-text">Inspector</span>
                </button>
                <button id="open-settings-btn" class="footer-btn">
                     <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M12,10A2,2 0 0,0 10,12A2,2 0 0,0 12,14A2,2 0 0,0 14,12A2,2 0 0,0 12,10M10,22C9.75,22 9.5,21.9 9.3,21.7L4.7,17.1C4.3,16.7 4.3,16.1 4.7,15.7C5.1,15.3 5.7,15.3 6.1,15.7L9.3,18.9C9.5,19.1 9.75,19.2 10,19.2C10.25,19.2 10.5,19.1 10.7,18.9L17.9,11.7C18.3,11.3 18.9,11.3 19.3,11.7C19.7,12.1 19.7,12.7 19.3,13.1L10.7,21.7C10.5,21.9 10.25,22 10,22M19.4,6C19,5.8 18.5,5.7 18,5.7C17.5,5.7 17,5.8 16.6,6L15,5.2V3.7C15,3.2 14.6,2.8 14.1,2.8H9.9C9.4,2.8 9,3.2 9,3.7V5.2L7.4,6C7,5.8 6.5,5.7 6,5.7C4.9,5.7 4,6.6 4,7.7V14C4,14.2 4,14.3 4.1,14.5L2.5,16.1C2.3,16.3 2.2,16.6 2.2,16.9C2.2,17.2 2.3,17.5 2.5,17.7C2.9,18.1 3.5,18.1 3.9,17.7L5.5,16.1C5.7,16.1 5.8,16.1 6,16.1C6.5,16.1 7,16 7.4,15.8L9,16.6V18.1C9,18.6 9.4,19 9.9,19H10.5C10.8,19 11,18.9 11.2,18.7L14.2,15.7C14.6,15.9 15.1,16 15.6,16H18C19.1,16 20,15.1 20,14V7.7C20,6.6 19.1,5.7 18,5.7C18.5,5.7 19,5.8 19.4,6Z" /></svg>
                     </span>
                     <span class="btn-text">Settings</span>
                </button>
                 <button id="pause-protection-btn" class="footer-btn" aria-label="Pause Protection for 15 minutes">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M14,19H18V5H14M6,19H10V5H6V19Z"></path></svg>
                    </span>
                     <span class="btn-text">Pause</span>
                </button>
                 <button id="forgetful-browsing-btn" class="footer-btn" aria-label="Toggle Forgetful Browsing">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M15,16H17V17H15V16M15,13H17V14H15V13M11,16H13V17H11V16M11,13H13V14H11V13M7,16H9V17H7V16M7,13H9V14H7V13M20,6H18V4C18,2.9 17.1,2 16,2H8C6.9,2 6,2.9 6,4V6H4C2.9,6 2,6.9 2,8V19C2,20.1 2.9,21 4,21H20C21.1,21 22,20.1 22,19V8C22,6.9 21.1,6 20,6M8,4H16V6H8V4M20,19H4V8H20V19Z" /></svg>
                    </span>
                     <span class="btn-text">Forgetful</span>
                </button>
                <button id="isolation-mode-btn" class="footer-btn" aria-label="Toggle Isolation Mode">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1Z"></path></svg>
                    </span>
                     <span class="btn-text">Isolation</span>
                </button>
            </footer>
        </div>
    </div>
    <div id="zg-toast-container"></div>
    <script type="module" src="../js/popup/popup.js"></script>
</body>
</html>
